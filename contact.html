<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma - Kathy B</title>
    <script src="https://kit.fontawesome.com/de191e769c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css" class="stylesheet">
</head>

<body class="contact">
    <div class="contact-header">
        <h1>Get In Touch</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore
            magna
            aliqua.</p>
    </div>
    <div class="contact-form">

        <form action="#" method="post">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Please enter your email" required>

            <label for="mobile">Mobile</label>
            <input type="tel" id="mobile" name="mobile" placeholder="Enter mobile" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>

            <button type="submit" class="submit-button">Submit ></button>
        </form>
    </div>

</body>
<footer class="footer">
    <p><span>Made with</span> ❤️</p>
</footer>

</html>
